<!DOCTYPE html>
    <html lang="en">
    <meta charset="UTF-8">
    <title>Register Forum</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="./style.css">

    <body>
        <script src="javaScript.js" defer></script>
        <div class="form-container">
            <h2>Login</h2>
            <p class="subtitle">Please Login to your account.</p>
            
            <form onsubmit="return Login(event)">
                <!-- Email Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com">
                    <span id="errorLoginEmail"></span>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="name">Password</label>
                    <input type="password" id="password" name="password" placeholder="password123!">
                    <span id="errorLoginPassword"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Login</button>
                <!-- ✅ Add this one line at the end -->
                <p id="successMessage"></p>
               
                <p>Click <a href="./Register.html">Register</a> if you have not Register</p>
            </form>
        </div>
    </body>
</html>
